<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - Preço Justo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow-sm border-0 rounded-4">
                <h3 class="text-center text-success fw-bold mb-4">Cadastrar</h3>
                {% with messages = get_flashed_messages() %}
                  {% if messages %}{% for m in messages %}<div class="alert alert-warning small">{{ m }}</div>{% endfor %}{% endif %}
                {% endwith %}
                <form method="POST">
                    <input type="text" name="username" class="form-control mb-3" placeholder="Nome de usuário" required>
                    <input type="password" name="password" class="form-control mb-4" placeholder="Crie uma senha" required>
                    <button class="btn btn-success w-100 rounded-pill py-2 fw-bold">Cadastrar</button>
                    <div class="text-center mt-3 small">Já tem conta? <a href="/login">Fazer login</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

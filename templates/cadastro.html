<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro - Tá Quanto?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; height: 100vh; }
        
        .register-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            margin: auto;
        }

        .btn-custom {
            background-color: #2b4570; /* Azul do logo */
            color: white;
            border: none;
            transition: 0.3s;
        }
        
        .btn-custom:hover {
            background-color: #1e3254;
            color: white;
            transform: scale(1.02);
        }

        .logo-img {
            max-width: 220px; /* Um pouco menor que o login para caber melhor os campos */
            height: auto;
            display: block;
            margin: 0 auto 15px auto;
        }

        .input-group-text {
            cursor: pointer;
            background-color: #fff;
        }

        .text-orange {
            color: #f37021; /* Laranja do logo */
        }
    </style>
</head>
<body>
    <div class="card p-4 register-card text-center">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Tá Quanto?" class="logo-img">
        
        <h3 class="fw-bold mb-3" style="color: #2b4570;">Criar Conta</h3>
        <p class="text-muted small mb-4">Cadastre-se para começar a economizar.</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for m in messages %}
                <div class="alert alert-danger small p-2">{{ m }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="small fw-bold text-muted ms-1">Escolha um Usuário</label>
                <input type="text" name="username" class="form-control" placeholder="Ex: joao_silva" required>
            </div>
            
            <div class="mb-4">
                <label class="small fw-bold text-muted ms-1">Sua Senha</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" class="form-control" placeholder="Mínimo 6 caracteres" required>
                    <span class="input-group-text" onclick="togglePassword('password', 'toggleIcon')">
                        <i class="bi bi-eye-slash" id="toggleIcon"></i>
                    </span>
                </div>
            </div>

            <button class="btn btn-custom w-100 rounded-pill py-2 fw-bold shadow-sm">Finalizar Cadastro</button>
            
            <div class="text-center mt-4 small">
                Já tem uma conta? <a href="/login" class="text-orange fw-bold text-decoration-none">Fazer Login</a>
            </div>
        </form>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const passwordField = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (passwordField.type === "password") {
                passwordField.type = "text";
                icon.className = "bi bi-eye"; // Olho aberto (mostrando)
            } else {
                passwordField.type = "password";
                icon.className = "bi bi-eye-slash"; // Olho riscado (escondido)
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<div class="p-2 mb-2 bg-white rounded shadow-sm border-start border-4 {% if item.produto_nome in promos_ativas %}border-danger{% else %}border-success{% endif %}">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <span class="fw-bold text-success">{{ item.quantidade }}x</span>
            <span class="ms-1 fw-bold">{{ item.produto_nome }}</span>
            
            {% if item.produto_nome in promos_ativas %}
            <div class="mt-1">
                <span class="badge bg-danger">
                    <i class="bi bi-lightning-fill"></i> PROMO! 
                </span>
                <small class="text-danger fw-bold ms-1" style="font-size: 0.7rem;">
                    Vence em: {{ promos_ativas[item.produto_nome] }}
                </small>
            </div>
            {% endif %}
        </div>
        
        <a href="/alternar-item/{{ item.id }}" class="btn btn-sm {% if item.marcado %}btn-success{% else %}btn-outline-secondary{% endif %} rounded-circle">
            <i class="bi bi-check"></i>
        </a>
    </div>
</div>

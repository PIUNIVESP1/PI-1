<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Minhas Listas - Preço Justo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; padding-bottom: 100px; font-family: 'Segoe UI', sans-serif; }
        .app-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; }
        .nav-item { text-align: center; color: #adb5bd; text-decoration: none; font-size: 0.75rem; }
        .nav-item.active { color: #198754; font-weight: bold; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-success m-0">Minhas Listas</h3>
        <button class="btn btn-success rounded-circle" data-bs-toggle="modal" data-bs-target="#modalLista"><i class="bi bi-plus"></i></button>
    </div>

    {% for lista in listas %}
    <div class="app-card shadow-sm">
        <h5 class="fw-bold mb-3">{{ lista.nome }}</h5>
        
        {% for item in lista.itens %}
        <div class="py-2 border-bottom d-flex justify-content-between align-items-center">
            <a href="/alternar-item/{{ item.id }}" class="text-decoration-none {% if item.marcado %}text-muted text-decoration-line-through{% else %}text-dark{% endif %}">
                <span class="badge bg-light text-dark border me-2">{{ item.quantidade }}x</span> {{ item.produto_nome }}
            </a>
        </div>
        {% endfor %}

        <form action="/adicionar-item/{{ lista.id }}" method="POST" class="mt-3 d-flex gap-2">
            <input type="number" name="quantidade" class="form-control" value="1" style="width: 80px;" min="1" required>
            <input type="text" name="produto_nome" list="listaProdutos" class="form-control" placeholder="Adicionar produto..." required>
            <button class="btn btn-success"><i class="bi bi-plus-lg"></i></button>
        </form>
    </div>
    {% endfor %}
</div>

<nav class="nav-bottom">
    <a href="/listas" class="nav-item active"><i class="bi bi-cart3 d-block fs-4"></i>Listas</a>
    <a href="/comparar" class="nav-item"><i class="bi bi-search d-block fs-4"></i>Comparar</a>
    <a href="/logout" class="nav-item text-danger"><i class="bi bi-box-arrow-right d-block fs-4"></i>Sair</a>
</nav>

<div class="modal fade" id="modalLista" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form action="/criar-lista" method="POST" class="modal-content rounded-4 p-4 border-0">
            <h5 class="fw-bold mb-3 text-success">Nome da Nova Lista</h5>
            <input type="text" name="nome_lista" class="form-control mb-3" placeholder="Ex: Churrasco, Mês..." required>
            <button class="btn btn-success w-100 rounded-pill">Criar</button>
        </form>
    </div>
</div>

<datalist id="listaProdutos">
    {% for s in sugestoes_lista %}<option value="{{ s }}">{% endfor %}
</datalist>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Preço Justo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 card p-4 shadow-sm border-0 rounded-4">
                <h3 class="text-center text-success fw-bold mb-4">Entrar</h3>
                <form method="POST">
                    <input type="text" name="username" class="form-control mb-3" placeholder="Usuário" required>
                    <input type="password" name="password" class="form-control mb-4" placeholder="Senha" required>
                    <button class="btn btn-success w-100 rounded-pill mb-3">Entrar</button>
                    <div class="text-center small">Não tem conta? <a href="/cadastro">Cadastre-se</a></div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
